services:
  postgres:
    image: postgres:15-alpine
    container_name: fatboy-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fatboy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-fatboy_menu}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fatboy-backend
    restart: always
    environment:
      PORT: 8372
      DATABASE_URL: postgresql://${POSTGRES_USER:-fatboy}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-fatboy_menu}
      BASE_DATA_DIR: ./base
      ADMIN_CATALOG_KEY: ${ADMIN_CATALOG_KEY:?ADMIN_CATALOG_KEY is required}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8371}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:?MINIO_ENDPOINT is required}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      MINIO_BUCKET: ${MINIO_BUCKET:-menu-fatboy}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:?MINIO_PUBLIC_URL is required}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - 8372

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fatboy-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-8371}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
